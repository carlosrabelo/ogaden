services:
  engine:
    build:
      context: .
      dockerfile: docker/engine/Dockerfile
      args:
        - SERVICE=engine
    container_name: ogaden-engine
    environment:
      - MEMCACHED_HOST=memcached
      - MEMCACHED_PORT=11211
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      memcached:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ogaden-network
    volumes:
      - ogaden_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-m", "ogaden.healthcheck"]
      interval: 60s
      timeout: 30s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
      args:
        - SERVICE=dashboard
    container_name: ogaden-dashboard
    environment:
      - MEMCACHED_HOST=memcached
      - MEMCACHED_PORT=11211
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    env_file:
      - .env
    ports:
      - "${DASHBOARD_PORT:-3501}:3501"
    depends_on:
      memcached:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ogaden-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3501/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  memcached:
    image: memcached:1.6.34-alpine
    container_name: ogaden-memcached
    restart: unless-stopped
    networks:
      - ogaden-network
    healthcheck:
      test: ["CMD", "echo", "stats"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  ogaden-network:
    name: ogaden-network
    driver: bridge

volumes:
  ogaden_data:
    driver: local
